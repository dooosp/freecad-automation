name = "infotainment_display_bracket_after"
material = "AL6061"
batch_size = 120

[product]
family = "display_module"
module_type = "AVN display bracket"
vehicle_program = "SDV cockpit platform"
revision = "B"
decision_scope = "improved design review after launch-risk reduction"
connector_clearance_mm = 7.2
connector_side = "rear connector-side clearance"
fastening_strategy = "semi-auto torque screwdriver with open access window"
traceability_label_area = "front flange label pad away from connector opening"

[manufacturing]
process = "sheet_metal"
material = "AL6061"

[production]
sites = ["Korea-Ulsan", "Mexico-MTY"]
annual_volume = 180000
target_ct_sec = 36
automation_mode = "hybrid"
pilot_lot = 120
automation_candidates = [
  "semi-auto torque assist",
  "vision-assisted bend-angle check",
  "inline barcode traceability",
]

[quality.traceability]
serial_level = "tray_and_lot"
record_linkage = "revision + supplier lot + operator"
label_strategy = "tray label with dedicated front-flange label pad"
retention_note = "Keep launch trace records until cross-site rollout is stable."

[[quality.critical_dimensions]]
id = "cd-01"
name = "mounting hole pitch"
target_mm = 140.0
tolerance = "±0.15"
rationale = "display module alignment"

[[quality.critical_dimensions]]
id = "cd-02"
name = "bend height"
target_mm = 38.0
tolerance = "±0.20"
rationale = "cockpit stack-up and gap/flush"

[[quality.gates]]
name = "Incoming blank verification"
objective = "Check thickness, alloy, and coating condition."
evidence = ["material cert", "incoming check sheet"]

[[quality.gates]]
name = "Bend and hole pattern verification"
objective = "Control bend angle and mounting pattern before downstream assembly."
evidence = ["first article", "inline gauge"]

[[quality.functional_test_points]]
id = "ftp-01"
name = "Display-module support alignment confirmation"
location = "end_of_line"
rationale = "confirm assembly alignment before cockpit module release"

