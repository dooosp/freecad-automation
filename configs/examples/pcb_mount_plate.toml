name = "pcb_mount_plate"
material = "AL6061"
batch_size = 150

[product]
family = "controller_subassembly"
module_type = "PCB mount plate"
vehicle_program = "Cluster / ICC electronics carrier"
revision = "A"
decision_scope = "machining readiness and line-support review"
connector_clearance_mm = 5.0
connector_side = "PCB connector-side slot"
fastening_strategy = "manual PCB screw fastening to mounting bosses"
traceability_label_area = "plate edge opposite connector slot"

[manufacturing]
process = "machining"
material = "AL6061"

[production]
sites = ["Korea-Gwangju"]
annual_volume = 220000
target_ct_sec = 28
automation_mode = "manual"
pilot_lot = 150
automation_candidates = [
  "vision check for connector boss location",
  "inline flatness measurement",
]

[quality.traceability]
serial_level = "lot"
record_linkage = "lot + revision + inspection record"
label_area = "plate edge opposite connector slot"

[[quality.critical_dimensions]]
id = "cd-01"
name = "PCB stand-off height"
target_mm = 8.0
tolerance = "±0.05"
rationale = "board coplanarity"

[[quality.critical_dimensions]]
id = "cd-02"
name = "connector slot position"
target_mm = 42.0
tolerance = "±0.10"
rationale = "electrical mating"

[[quality.functional_test_points]]
id = "ftp-01"
name = "PCB connector-side clearance confirmation"
location = "end_of_line"
rationale = "prevent interference during controller subassembly build"

