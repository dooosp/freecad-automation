# Assembly companion config for tolerance analysis.
# Keeps the original single-part bracket config unchanged for create/draw/dfm.

name = "cnc_motor_mount_bracket_assembly"
standard = "KS"

[export]
formats = ["step"]
directory = "output"

[[parts]]
id = "bracket_body"
final = "body"

  [[parts.shapes]]
  id = "base_plate"
  type = "box"
  length = 120
  width = 80
  height = 10

  [[parts.shapes]]
  id = "support_web"
  type = "box"
  length = 12
  width = 80
  height = 60
  position = [0, 0, 8]

  [[parts.shapes]]
  id = "support_rib"
  type = "box"
  length = 36
  width = 80
  height = 36
  position = [12, 0, 8]

  [[parts.shapes]]
  id = "mount_hole_1"
  type = "cylinder"
  radius = 4.5
  height = 16
  position = [20, 15, -3]

  [[parts.shapes]]
  id = "mount_hole_2"
  type = "cylinder"
  radius = 4.5
  height = 16
  position = [100, 15, -3]

  [[parts.shapes]]
  id = "mount_hole_3"
  type = "cylinder"
  radius = 4.5
  height = 16
  position = [20, 65, -3]

  [[parts.shapes]]
  id = "mount_hole_4"
  type = "cylinder"
  radius = 4.5
  height = 16
  position = [100, 65, -3]

  [[parts.shapes]]
  id = "locating_bore"
  type = "cylinder"
  radius = 10
  height = 16
  position = [60, 40, -3]

  [[parts.operations]]
  op = "fuse"
  base = "base_plate"
  tool = "support_web"
  result = "body"

  [[parts.operations]]
  op = "fuse"
  base = "body"
  tool = "support_rib"
  result = "body"

  [[parts.operations]]
  op = "cut"
  base = "body"
  tool = "mount_hole_1"
  result = "body"

  [[parts.operations]]
  op = "cut"
  base = "body"
  tool = "mount_hole_2"
  result = "body"

  [[parts.operations]]
  op = "cut"
  base = "body"
  tool = "mount_hole_3"
  result = "body"

  [[parts.operations]]
  op = "cut"
  base = "body"
  tool = "mount_hole_4"
  result = "body"

  [[parts.operations]]
  op = "cut"
  base = "body"
  tool = "locating_bore"
  result = "body"

[[parts]]
id = "locating_pin"
final = "pin_body"

  [[parts.shapes]]
  id = "pin_body"
  type = "cylinder"
  radius = 10
  height = 24
  axis = [0, 0, 1]

[assembly]

  [[assembly.parts]]
  ref = "bracket_body"
  position = [0, 0, 0]

  [[assembly.parts]]
  ref = "locating_pin"
  position = [60, 40, -3]

  [[assembly.mates]]
  type = "coaxial"
  part1 = "bracket_body"
  face1 = "cyl:z:min"
  part2 = "locating_pin"
  face2 = "cyl:z"

[tolerance]
recommend = true
csv = true

  [tolerance.specs]
  "bracket_body/locating_pin" = "H7/g6"
