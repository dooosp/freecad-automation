name: Automation CI (hosted fast lanes)

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: automation-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-contract:
    name: Node contract lane (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: CI Diagnostics
        run: |
          mkdir -p .ci
          bash .github/scripts/ci-diagnostics.sh | tee .ci/node-contract-diagnostics.txt

      - name: Install Node Dependencies
        run: bash .github/scripts/retry.sh 3 15 npm ci --no-audit --prefer-offline

      - name: Run Node contract lane
        run: npm run test:node:contract

      - name: Upload Core Diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: node-contract-${{ matrix.os }}-${{ github.run_id }}
          path: .ci/node-contract-diagnostics.txt
          if-no-files-found: warn

  node-integration:
    name: Node integration lane
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node Dependencies
        run: bash .github/scripts/retry.sh 3 15 npm ci --no-audit --prefer-offline

      - name: Run Node integration lane
        run: npm run test:node:integration

  snapshots:
    name: Snapshot lane
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node Dependencies
        run: bash .github/scripts/retry.sh 3 15 npm ci --no-audit --prefer-offline

      - name: Run snapshot lane
        run: npm run test:snapshots

  python:
    name: Python lane
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node Dependencies
        run: bash .github/scripts/retry.sh 3 15 npm ci --no-audit --prefer-offline

      - name: Install Python Test Dependencies
        run: bash .github/scripts/retry.sh 3 15 python3 -m pip install --upgrade pip pytest

      - name: Run Python lane
        run: npm run test:py

      - name: Upload Python Diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-lane-${{ github.run_id }}
          path: .pytest_cache
          if-no-files-found: warn
