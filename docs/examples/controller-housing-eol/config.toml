[drawing.meta]
part_name = "Controller Housing EOL"
drawing_no = "CTRL-HOUSING-EOL-C"
material = "AL6061"
tolerance = "Project launch tolerance plan"
units = "mm"

[drawing.style]
show_hidden = true
