  "Material: AL6061 casting with machined datum and sealing surfaces.",
  "Torque spec: 0.85 Nm for six assembly closeout screws.",
  "EOL release requires barcode pairing, torque trace, gasket confirmation, and functional electrical pass.",
]

[drawing_intent]
part_type = "controller_housing_eol"
manufacturing_process = "casting"
material = "AL6061"
required_views = ["front", "top", "right", "iso"]
drawing_standard = "project-default"
missing_semantics_policy = "advisory"

[drawing_intent.datum_strategy]
primary = "pcb_mount_face"
secondary = "rear_connector_opening"
tertiary = "front_left_mounting_hole"
scheme = "assembly-oriented enclosure datum using the PCB mount face, connector opening, and mounting hole pattern"
notes = ["Use connector datum, sealing interface, and mounting pattern as launch drawing QA references only."]

[drawing_intent.tolerance_policy]
general = "Carry source critical dimensions forward; do not infer additional geometric tolerances."
gdt = "none"
notes = ["Connector datum and seal groove depth are controlled by the source quality metadata."]

